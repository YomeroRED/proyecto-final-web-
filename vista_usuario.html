<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Portal | UAS — Préstamo de Equipos</title>

  <!-- Fuentes Google (preconnect completo, igual que index.html) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />

  <!-- Hojas de estilo -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

  <nav class="topbar topbar--usuario">
    <div class="topbar-brand">
      <div class="escudo">🎓</div>
      <span>UAS · Préstamo de Equipos</span>
    </div>
    <div class="topbar-right">
      <div class="usuario-info">
        <div class="nombre" id="nav-nombre">Cargando...</div>
        <div class="tipo"   id="nav-tipo">—</div>
      </div>
      <button class="btn-salir" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
  </nav>

  <main class="main">

    <!-- Tarjeta de perfil -->
    <div class="perfil-card">
      <div class="perfil-avatar" id="avatar-icono">🎒</div>
      <div class="perfil-datos">
        <h2 id="perfil-nombre">—</h2>
        <p  id="perfil-unidad">—</p>
        <div class="perfil-badges">
          <span class="badge" id="badge-tipo">—</span>
          <span class="badge" id="badge-carrera" style="display:none">—</span>
          <span class="badge" id="badge-grupo"   style="display:none">—</span>
        </div>
      </div>
    </div>

    <!-- Módulos de acción -->
    <div class="modulos-grid">
      <div class="modulo-card modulo-card--usuario">
        <div class="icono">🔍</div>
        <h3>Ver Equipos</h3>
        <p>Consultar disponibilidad</p>
        <span class="badge-fase2">Fase 2</span>
      </div>
      <div class="modulo-card modulo-card--usuario">
        <div class="icono">📝</div>
        <h3>Solicitar Préstamo</h3>
        <p>Pedir equipo disponible</p>
        <span class="badge-fase2">Fase 2</span>
      </div>
      <div class="modulo-card modulo-card--usuario">
        <div class="icono">📦</div>
        <h3>Mis Préstamos</h3>
        <p>Ver historial y activos</p>
        <span class="badge-fase2">Fase 2</span>
      </div>
      <div class="modulo-card modulo-card--usuario">
        <div class="icono">🔔</div>
        <h3>Notificaciones</h3>
        <p>Avisos y recordatorios</p>
        <span class="badge-fase2">Fase 2</span>
      </div>
    </div>

  </main>

  <script src="js/database.js"></script>
  <script>
    (function() {
      const sesion = JSON.parse(sessionStorage.getItem('uas_session') || 'null');
      if (!sesion || sesion.tipo === 'Empleado') {
        window.location.href = 'index.html';
        return;
      }

      const esMaestro = sesion.tipo === 'Maestro';

      document.getElementById('nav-nombre').textContent    = sesion.nombre;
      document.getElementById('nav-tipo').textContent      = `${sesion.tipo} · ${sesion.unidad || 'UAS'}`;
      document.getElementById('perfil-nombre').textContent = sesion.nombre;
      document.getElementById('perfil-unidad').textContent = sesion.unidad || 'UAS';
      document.getElementById('badge-tipo').textContent    = sesion.tipo;
      document.getElementById('avatar-icono').textContent  = esMaestro ? '👨‍🏫' : '🎒';

      if (sesion.carrera) {
        const bc = document.getElementById('badge-carrera');
        bc.textContent    = sesion.carrera;
        bc.style.display  = 'inline-block';
      }
      if (sesion.grupo) {
        const bg = document.getElementById('badge-grupo');
        bg.textContent   = `Grupo ${sesion.grupo}`;
        bg.style.display = 'inline-block';
      }
    })();

    function cerrarSesion() {
      sessionStorage.removeItem('uas_session');
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
